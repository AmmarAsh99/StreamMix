server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # KILL CACHE FOR HTML FILES
        # This ensures the browser always asks for the latest index.html
        if ($request_uri ~* \.(html)$) {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires -1;
        }
    }

    # ALLOW CACHING FOR HASHED ASSETS
    # Angular generates unique names (main.js -> main.a1b2c.js), so caching these is safe.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}