<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-xl text-center">
    <h1 class="text-2xl font-bold mb-4">Video Stream</h1>

    <input
      type="text"
      placeholder="Paste video URL here"
      class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
      [(ngModel)]="videoUrl"
    />

    <button
      class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 transition"
      (click)="loadVideo()"
    >
      ammar made this change for testing
    </button>

    <div class="mt-6">
      <video controls class="w-full rounded-lg" [src]="videoSrc()"></video>
    </div>
  </div>
</div>
