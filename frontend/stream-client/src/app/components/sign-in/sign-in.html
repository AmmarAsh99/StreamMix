<div class="min-h-screen flex">
  <!-- LEFT BRAND PANEL -->
  <div class="hidden md:flex flex-1 flex-col items-center justify-center bg-sky-50 px-8 py-12">
    <div class="flex items-center gap-3 mb-10">
      <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
          <path
            d="M6.3 2.841A1.5 1.5 0 004 4.11v11.78a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"
          />
        </svg>
      </div>
      <span class="text-xl font-medium text-sky-900">StreamMix</span>
    </div>
    <p class="text-2xl font-medium text-sky-900 text-center leading-relaxed max-w-xs">
      Your favorite shows, <span class="text-sky-500">all in one place.</span>
    </p>
  </div>

  <!-- RIGHT FORM PANEL -->
  <div class="flex flex-1 flex-col justify-center px-8 py-12 bg-white">
    <div class="mx-auto w-full max-w-sm">
      <h2 class="text-2xl font-medium text-gray-900 mb-1">Welcome back</h2>
      <p class="text-sm text-gray-500 mb-8">
        Don't have an account?
        <a routerLink="/sign-up" class="text-sky-500 font-medium hover:underline cursor-pointer">
          Create one for free
        </a>
      </p>

      <form (ngSubmit)="onSubmit()">
        <!-- Error message -->
        <div
          *ngIf="errorMessage()"
          class="mb-4 px-4 py-3 bg-red-50 border border-red-100 rounded-lg text-sm text-red-600"
        >
          {{ errorMessage() }}
        </div>

        <!-- Email -->
        <div class="mb-4">
          <label for="email-address" class="block text-sm font-medium text-gray-600 mb-1.5">
            Email address
          </label>
          <div class="relative">
            <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.917V6.75"
                />
              </svg>
            </span>
            <input
              [(ngModel)]="email"
              id="email-address"
              name="email"
              type="email"
              autocomplete="email"
              required
              placeholder="you@example.com"
              class="w-full h-11 pl-10 pr-4 text-sm border border-gray-200 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-sky-400 focus:border-transparent transition"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="mb-6">
          <div class="flex justify-between items-center mb-1.5">
            <label for="password" class="block text-sm font-medium text-gray-600"> Password </label>
          </div>
          <div class="relative">
            <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
              <svg
                class="w-4 h-4"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"
                />
              </svg>
            </span>
            <input
              [(ngModel)]="password"
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              placeholder="••••••••"
              class="w-full h-11 pl-10 pr-4 text-sm border border-gray-200 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-sky-400 focus:border-transparent transition"
            />
          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full h-11 bg-sky-500 hover:bg-sky-600 disabled:bg-sky-300 disabled:cursor-not-allowed text-white text-sm font-medium rounded-lg transition flex items-center justify-center gap-2"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"
            />
          </svg>
          {{ isLoading() ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>
    </div>
  </div>
</div>
