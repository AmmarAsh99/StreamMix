name: CI/CD Pipeline

on:
  push:
    branches:
      - main

# This allows the Action to push the updated YAML back to your repo
permissions:
  contents: write

jobs:
  build-push-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/stream-client
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/streammix-frontend:${{ github.sha }}
            ${{ vars.DOCKER_USERNAME }}/streammix-frontend:latest

  build-push-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/streammix-backend:${{ github.sha }}
            ${{ vars.DOCKER_USERNAME }}/streammix-backend:latest

  update-mainfests:
    needs: [build-push-frontend, build-push-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: AmmarAsh99/streammix-gitops
          path: streammix-gitops

      - name: Update Manifests
        run: |
          sed -i "s|streammix-frontend:.*|streammix-frontend:${{ github.sha }}|g" streammix-gitops/frontend/frontend-deployment.yaml

          sed -i "s|streammix-backend:.*|streammix-backend:${{ github.sha }}|g" streammix-gitops/backend/backend-deployment.yaml

      - name: Commit and Push
        run: |
          cd streammix-gitops

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          git commit -m "deploy: update images to ${{ github.sha }}" || echo "No changes"

          git push
