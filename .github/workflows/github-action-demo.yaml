name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------- FRONTEND ----------------
      - name: Build & Push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend/stream-client
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/streammix-frontend:${{ github.sha }}
            ${{ vars.DOCKER_USERNAME }}/streammix-frontend:latest

      # ---------------- BACKEND ----------------
      - name: Build & Push Backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/streammix-backend:${{ github.sha }}
            ${{ vars.DOCKER_USERNAME }}/streammix-backend:latest
