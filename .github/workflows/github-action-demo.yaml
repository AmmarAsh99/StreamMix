name: Build and Push Docker Images

on:
  push:
    branches:
      - main

# This allows the Action to push the updated YAML back to your repo
permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------- FRONTEND ----------------
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/stream-client
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/streammix-frontend:${{ github.sha }}
            ${{ vars.DOCKER_USERNAME }}/streammix-frontend:latest

      # ---------------- BACKEND ----------------
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/streammix-backend:${{ github.sha }}
            ${{ vars.DOCKER_USERNAME }}/streammix-backend:latest

      # ---------------- GITOPS UPDATE ----------------
      - name: Update Manifests
        run: |
          # These lines search for ":latest" and replace it with the specific commit ID
          sed -i "s|streammix-frontend:latest|streammix-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml
          sed -i "s|streammix-backend:latest|streammix-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml

      - name: Commit and Push to Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/*.yaml
          git commit -m "deploy: update images to ${{ github.sha }}"
          git push